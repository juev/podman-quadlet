global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["host.containers.internal:9100"]
        labels:
          instance: loffe
      - targets: ["100.64.0.4:9100"]
        labels:
          instance: v54829
      - targets: ["100.64.0.3:9100"]
        labels:
          instance: moscow

  - job_name: podman
    static_configs:
      - targets: ["prometheus-podman-exporter:9882"]

  - job_name: synology
    scrape_interval: 60s
    static_configs:
      - targets: ["100.64.0.1"]
    metrics_path: /snmp
    params:
      module: ["synology", "if_mib", "ucd_system_stats", "ucd_memory", "ucd_la_table", "hrSystem", "hrDevice", "hrStorage"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
