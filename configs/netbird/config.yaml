server:
  listenAddress: ":80"
  exposedAddress: "https://netbird.example.org:443"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"
  authSecret: "CHANGE_ME"
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "https://netbird.example.org/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "https://netbird.example.org/nb-auth"
      - "https://netbird.example.org/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  store:
    engine: "sqlite"
    encryptionKey: "CHANGE_ME"
