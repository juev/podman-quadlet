global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:465'
  smtp_from: 'alerts@example.org'
  smtp_auth_username: 'CHANGE_ME'
  smtp_auth_password: 'CHANGE_ME'
  smtp_require_tls: false
  telegram_api_url: 'https://api.telegram.org'

route:
  receiver: ntfy-default
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: critical-all
      matchers:
        - severity="critical"
      group_wait: 10s
      repeat_interval: 1h
    - receiver: warning-telegram
      matchers:
        - severity="warning"
      repeat_interval: 4h

receivers:
  - name: critical-all
    telegram_configs:
      - bot_token: 'CHANGE_ME'
        chat_id: 0
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} <b>CRITICAL: {{ .GroupLabels.alertname }}</b>
          {{ range .Alerts }}
          Instance: {{ .Labels.instance }}
          {{ .Annotations.description }}
          {{ end }}
    email_configs:
      - to: 'admin@example.org'
        send_resolved: true
    webhook_configs:
      - url: 'http://alertmanager:CHANGE_ME@ntfy:80/alerts?template=alertmanager'
        send_resolved: true

  - name: warning-telegram
    telegram_configs:
      - bot_token: 'CHANGE_ME'
        chat_id: 0
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🟡{{ else }}🟢{{ end }} <b>WARNING: {{ .GroupLabels.alertname }}</b>
          {{ range .Alerts }}
          Instance: {{ .Labels.instance }}
          {{ .Annotations.description }}
          {{ end }}
    webhook_configs:
      - url: 'http://alertmanager:CHANGE_ME@ntfy:80/alerts?template=alertmanager'
        send_resolved: true

  - name: ntfy-default
    webhook_configs:
      - url: 'http://alertmanager:CHANGE_ME@ntfy:80/alerts?template=alertmanager'
        send_resolved: true
